<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <!--<ion-button (click)="retour()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>-->

      <ion-back-button
        [defaultHref]="type === 'developpeur' ? '/postulation' : '/notification'"
      ></ion-back-button>
    </ion-buttons>
    <ion-title>Évaluer {{ typeEvalue }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="project-info-card">
    <ion-card-header>
      <ion-card-title>{{ projet?.Nomduprojet }}</ion-card-title>
      <ion-card-subtitle>{{ projet?.Publierparentreprise }}</ion-card-subtitle>
    </ion-card-header>
  </ion-card>
  <ion-card class="evaluation-form-card">
    <ion-card-header>
      <ion-card-title>Votre évaluation</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="opinion-section">
        <ion-label class="section-label">Type d'avis</ion-label>
        <div class="opinion-buttons">
          <ion-button
            [class.active]="avisType === 'positif'"
            (click)="avisType = 'positif'"
            class="opinion-btn positive"
          >
            <ion-icon name="thumbs-up" slot="start"></ion-icon>
            Positif
          </ion-button>

          <ion-button
            [class.active]="avisType === 'negatif'"
            (click)="avisType = 'negatif'"
            class="opinion-btn negative"
          >
            <ion-icon name="thumbs-down" slot="start"></ion-icon>
            Négatif
          </ion-button>
        </div>
      </div>
      <div class="rating-section">
        <ion-label class="section-label">Note</ion-label>
        <div class="stars">
          <ion-icon
            *ngFor="let n of [1,2,3,4,5]"
            [name]="n <= note ? 'star' : 'star-outline'"
            (click)="note = n"
          >
          </ion-icon>
        </div>
        <p class="note-text">{{ getNoteText() }}</p>
      </div>
      <div class="comment-section">
        <ion-label class="section-label">Commentaire</ion-label>
        <ion-textarea
          [(ngModel)]="commentaire"
          rows="5"
          placeholder="Partagez votre expérience..."
          class="comment-textarea"
        >
        </ion-textarea>
      </div>
      <ion-button
        expand="block"
        (click)="publierAvis()"
        [disabled]="!note || !commentaire || !avisType"
        class="submit-btn"
      >
        <ion-icon name="send" slot="start"></ion-icon>
        Publier l'avis
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
