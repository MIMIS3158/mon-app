<ion-content>
  <ion-card>
    <div class="reset-container">
      <ion-label class="title">Mot de passe oublié ?</ion-label>
      <p class="subtitle">Entrez votre email pour recevoir un code de réinitialisation</p>

      <div class="input-box">
        <ion-icon name="mail" slot="start"></ion-icon>
        <input 
          [(ngModel)]="email" 
          class="input-field"
          placeholder="Votre email"
          type="email">
      </div>

      <ion-button 
        (click)="envoyerCode()" 
        class="submit-btn"
        [disabled]="!email">
        Envoyer le code
      </ion-button>

      <div class="back-link">
        <a routerLink="/home">← Retour à la connexion</a>
      </div>
    </div>
  </ion-card>
</ion-content>
