<ion-header>
  <ion-toolbar>
    <ion-title>{{ 'PARAMETRES' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-button">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="profile-section">
    <ion-avatar>
      <img
        [src]="profileImage || 'assets/profile_avatar.jpeg'"
        alt="Profile"
        (error)="onImageError($event)"
      />
    </ion-avatar>
    <h2>{{ userName | titlecase }}</h2>
    <p class="view-profile" (click)="openProfile()">
      {{ 'VOIR_PROFIL' | translate }}
    </p>
  </div>

  <ion-list class="settings-list">

    <ion-item button (click)="mesEvaluations()" class="menu-item">
      <ion-icon name="star-outline" slot="start"></ion-icon>
      <ion-label>{{ 'MES_EVALUATIONS' | translate }}</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="save()" class="menu-item">
      <ion-icon name="bookmark-outline" slot="start"></ion-icon>
      <ion-label>{{ 'SAUVEGARDER' | translate }}</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="aide()" class="menu-item">
      <ion-icon name="help-circle-outline" slot="start"></ion-icon>
      <ion-label>{{ 'AIDE' | translate }}</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item>
      <ion-icon name="language-outline" slot="start"></ion-icon>
      <ion-label>{{ 'LANGUE' | translate }}</ion-label>
      <ion-select [(ngModel)]="selectedLang" (ionChange)="changeLang($event)">
        <ion-select-option value="fr">🇫🇷 Français</ion-select-option>
        <ion-select-option value="en">🇬🇧 English</ion-select-option>
        <ion-select-option value="ar">🇩🇿 العربية</ion-select-option>
      </ion-select>
    </ion-item>

    <div class="divider"></div>

    <ion-item button (click)="logout()" class="menu-item logout">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      <ion-label>{{ 'DECONNEXION' | translate }}</ion-label>
    </ion-item>

  </ion-list>
</ion-content>
