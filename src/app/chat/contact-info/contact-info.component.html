<ion-header>
  <ion-toolbar>

    <div class="modal-handle"></div>
    
    <ion-title>Détails</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  
  <div class="profile-section">
    <img *ngIf="photo" [src]="photo" class="profile-photo"/>
    <div *ngIf="!photo" class="profile-avatar">
      {{ name.charAt(0).toUpperCase() }}
    </div>
    <h2 class="profile-name">{{ name | titlecase }}</h2>
  </div>


  <ion-list lines="full">
    <ion-item button (click)="voirProfil()">
      <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Voir le profil</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>
<ion-item button (click)="bloquer()">
  <ion-icon 
    [name]="isBlocked ? 'lock-open-outline' : 'ban-outline'" 
    slot="start" 
    color="warning">
  </ion-icon>
  <ion-label>{{ isBlocked ? 'Débloquer' : 'Bloquer' }}</ion-label>
  <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
</ion-item>

    <ion-item button (click)="signaler()">
      <ion-icon name="flag-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Signaler</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="supprimerDiscussion()">
      <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Supprimer la discussion</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
